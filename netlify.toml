[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/ascii/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/feed"
  to = "/rss.xml"
  status = 301

[[redirects]]
  from = "/rss"
  to = "/rss.xml"
  status = 301
